name: Build Windows .exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0)"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller --onedir --windowed -y --name "BoardingHouseFinder" `
            --add-data "assets;assets" `
            --hidden-import "src.logger" `
            --collect-all "customtkinter" `
            --collect-all "CTkScrollableDropdown" `
            --collect-all "tkinterdnd2" `
            --collect-all "PIL" `
            main.py

      - name: Compress to ZIP
        run: Compress-Archive -Path dist/BoardingHouseFinder/* -DestinationPath BoardingHouseFinder.zip

      - uses: actions/upload-artifact@v4
        with:
          name: BoardingHouseFinder
          path: dist/BoardingHouseFinder/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' || inputs.tag != ''
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
          files: BoardingHouseFinder.zip
