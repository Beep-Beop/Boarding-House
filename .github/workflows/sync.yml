name: Sync to Hugging Face Space

on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: huggingface/hub-sync@v0.1.0
      with:
        huggingface_repo_id: 'BeepBeop/boarding-house-api'
        hf_token: '${{ secrets.HF_TOKEN }}'
